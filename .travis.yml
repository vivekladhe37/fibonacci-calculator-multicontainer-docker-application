language: genric
sudo: required
services:
  - docker

before_install:
  - docker build -t vivekliladharladhe37/react-test -f ./client/Dockerfile.dev ./client

script:
  - docker run -e CI=true vivekliladharladhe37/react-test npm test -- --coverage

after_success:
  - docker build -t vivekliladharladhe37/multi-client ./client
  - docker build -t vivekliladharladhe37/multi-nginx ./nginx
  - docker build -t vivekliladharladhe37/multi-server ./server
  - docker build -t vivekliladharladhe37/multi-worker ./worker
  # Log in to the Docker CLI
  - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  # Push images to Docker Hub 
  - docker push vivekliladharladhe37/multi-client
  - docker push vivekliladharladhe37/multi-nginx
  - docker push vivekliladharladhe37/multi-server
  - docker push vivekliladharladhe37/multi-worker

deploy:
  provider: elasticbeanstalk
  region: 'us-east-1'
  app: 'multi-docker'
  env: 'MultiDocker-env'
  bucket_name: 'elasticbeanstalk-ca-central-1-923445559289'
  bucket_path: 'docker-multi'
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY